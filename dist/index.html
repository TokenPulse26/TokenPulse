<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TokenPulse</title>
<style>
  :root {
    --bg: #0b1020; --surface: #111a2e; --border: #1d2a44;
    --text: #e6ecf7; --dim: #8fa1bd; --teal: #2dd4bf; --green: #4ade80;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; align-items: center; justify-content: center;
    height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 32px 40px; text-align: center; min-width: 320px;
  }
  h1 { font-size: 20px; letter-spacing: .02em; margin-bottom: 6px; }
  .status { color: var(--dim); font-size: 13px; margin-bottom: 18px; }
  .status .ok { color: var(--green); }
  a.button {
    display: inline-block; background: var(--teal); color: #06281f;
    font-weight: 600; font-size: 14px; text-decoration: none;
    padding: 10px 22px; border-radius: 999px;
  }
  .hint { margin-top: 14px; font-size: 12px; color: var(--dim); }
  code { color: var(--teal); }
</style>
</head>
<body>
  <div class="card">
    <h1>TokenPulse</h1>
    <p class="status" id="status">Checking proxy…</p>
    <a class="button" href="http://127.0.0.1:4200" target="_blank" rel="noopener">Open Dashboard</a>
    <p class="hint">Proxy routes live at <code>http://127.0.0.1:4100</code></p>
  </div>
  <script src="main.js"></script>
</body>
</html>
